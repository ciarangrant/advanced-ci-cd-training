server.port=8080
# feedback round 2026-04-17 / FB-005-ENV — expose /actuator/prometheus and
# rename the default MVC counter so it aligns with prom-client and
# prometheus-fastapi-instrumentator naming (http_requests_total).
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.service=java-web
management.metrics.distribution.percentiles-histogram.http.server.requests=false
